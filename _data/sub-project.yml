- title: 신규 브랜드관(타미힐피거/무스너클) 구축 내부 기술 리딩
  period: 2023.02 ~ 2023.08
  skills: Java, Spring, JSP
  summary: 외부 에이전시가 개발하는 브랜드관 구축 프로젝트의 **내부 기술 책임을 담당**. 기존 H패션몰의 코어 전시 로직을 보호하면서 외부 시스템과 안전하게 연동되도록 백엔드 API 아키텍처를 설계하고 사이드 이펙트를 검증함

- title: 모바일 메인 페이지 구조 개편 및 300+ 해외 브랜드 입점
  period: 2022.10 ~ 2023.03
  skills: Java, Spring, JSP
  summary: 모바일 메인 전시 코너의 비효율적인 기존 1:1 데이터 매핑 로직을 **1:N 구조로 전면 개편**하여 전시 렌더링 성능을 개선하고, 이를 기반으로 300개 이상의 해외 브랜드 전시 및 검색 기능을 안정적으로 확장함
