-   info: Java & Spring 기반 커머스 플랫폼에서 비효율적인 낡은 구조를 걷어내고, 시스템이 스스로 일하게 만드는 <mark>6년차 백엔드 개발자</mark>입니다.

-   info: 다양한 조직에서 우수한 성과를 증명해 온 원동력은, 단순히 요구사항을 구현하는 것을 넘어 <mark>시스템의 구조적 결함과 비효율을 선제적으로 찾아내 해결하는 것</mark>에 있습니다. 대규모 트래픽이 발생하는 커머스 환경에서 확장성과 안정성의 균형을 맞추며 아래의 가치를 만들어왔습니다.

-   info: <mark>전시 아키텍처 설계</mark> 신규 전문관(Lime) 런칭 시 도메인의 복잡도를 낮추기 위해 '전시 전용 단일 테이블(Read Model)'을 설계하여, 트래픽 폭증에도 흔들림 없는 빠른 렌더링 환경과 신규 콘텐츠 확장에 유연한 구조를 구축했습니다.

-   info: <makr>장애 예방을 위한 선제적 해결</mark> "지금 당장 돌아가는 시스템"에 만족하지 않습니다. 리뷰 API(Crema) 연동 시 발생하던 월 1,000만 건 이상의 데이터 폭증 리스크를 사전에 식별하고, 단건 전송을 List 형태의 배치로 전환 및 구조를 전면 재설계하여 인터페이스 누적 데이터를 98% 이상 획기적으로 감소시키며 잠재적 장애 요소를 차단했습니다.

-   info: <mark>AI 기반 운영 리소스 제로화 (Zero-Ops)</mark> 비즈니스 조직이 운영 리드타임에 얽매이지 않도록 시스템이 사람을 대체하는 환경을 지향합니다. Cloud Vision AI를 활용해 비정형 데이터(리뷰, 푸드톡, 레시피 이미지)의 라벨링을 자동화하여 데이터 자산화를 이끌었고, n8n 기반의 AI Agent 파이프라인을 구축해 개발과 운영 간의 커뮤니케이션 및 수기 작업을 효율화했습니다.

-   info: 정답이 없는 토스에서, 폭발적인 트래픽 앞에서도 견고할 수 있는 서비스를 동료들과 함께 설계하고 싶습니다.
