-   title: 이기종 도메인 데이터를 통합한 콘텐츠 피드형 전문관 전시 플랫폼 설계 및 구축
    index: 1
    period: 2025.9 ~ 2025.12
    info : |
        * Spring Boot
        * Spring
        * Java
        * REST API
        * JPA
        * Vue.js
        * JSP
    person: |
        개발 2, 기획 1, 마케팅 2, 운영 3
    description: |
        * Health & Wellness 전문관 신규 런칭을 위한 전용 <mark>전시/콘텐츠 플랫폼 구축</mark>
        * 상품, 레시피, 리뷰, 매거진, 이렇게먹어보세요, 배너, 전체상품리스트 등 다양한 콘텐츠 타입을 하나의 전시 구조를 위한 테이블 설계 및 통합
        * 운영자가 설정만으로 콘텐츠 구성 및 노출 순서를 변경할 수 있도록 Back Office 중심 구조 설계
        * 신규 콘텐츠 타입 추가 시 API 및 테이블 확장만으로 대응 가능하도록 설계
    title2: Health & Wellness 전문관 Lime 신규 구축
    background: |
        * SKU 40개 규모의 소형 전문관
            * 기존 상품 리스트 중심 전시와 달리 리뷰, 레시피, 매거진, 배너, 푸드톡 등 여러 도메인 데이터를 결합한 콘텐츠 중심 피드형 UX가 필요
            * 리뷰/푸드톡/레시피 등 이기종 데이터 결합 필요
    techinal: |
        * 전문관 화면을 구성하기 위해 상품, 리뷰, 레시피 등 이기종 데이터를 하나의 API에서 제공해야 함
        * <strong>성능 리스크</strong>: 기존 방식대로 각 API 병렬 호출 또는 최대 7개 테이블 Join 필요
            * <strong>대안 검토</strong>: API 병렬 호출 + Aggregation(BFF) 레이어로 단일 응답을 만드는 구조도 검토
            * 문제 : 콘텐츠 로딩 속도 차이로 UX 일관성 저하 가능성 존재
            * 문제 : 조회 트래픽 증가 시 DB 병목 리스크 발생 우려
    architecture: |
        * UI 응답 속도와 일관성을 확보하기 위해 전시 전용 Read Model 테이블을 설계
        * 변동성이 낮은 메타데이터는 Read Model에 통합 저장하고 정합성이 중요한 가격 정보만 원본 테이블과 최소 Join하도록 설계
    problem: |
        * <strong>비즈니스 제약 극복</strong>: SKU 40개 규모의 소형 전문관
            * 단순 상품 나열 구조로는 체류 시간 및 구매전환율 확보가 어려웠음
            * 리뷰/푸드톡/레시피 등 서로 다른 도메인 데이터를 결합한 콘텐츠 중심 피드형 UX 전략이 필요했음
            * 캐시 도입 시 동일 응답 반복 노출로 사용자 체감 다양성 저하 가능성 존재
        * <strong>성능 리스크</strong>: 기존 방식대로 각 API 병렬 호출 또는 최대 7개 테이블 Join 필요
            * <strong>대안 검토</strong>: API 병렬 호출 + Aggregation(BFF) 레이어로 단일 응답을 만드는 구조도 검토
            * 문제 : 콘텐츠 로딩 속도 차이로 UX 일관성 저하 가능성 존재
            * 문제 : 조회 트래픽 증가 시 DB 병목 리스크 발생 우려
        * <strong>복잡한 비즈니스 로직</strong>: 일반,임직원,유료멤버십 등 사용자 세그먼트별로 상이한 실시간 가격 노출 필요
    solution: |
        * <mark>[Read Model 아키텍처 설계]</mark> UI 일관성과 응답 속도 확보를 위해 이기종 데이터를 전시 전용 테이블에 통합 적재
            * 특히 변동성이 적은 메타데이터(이미지, 텍스트)를 전시 전용 단일 테이블로 통합 적재
         * <mark>[성능과 정합성의 Trade-off 균형]</mark> 실시간 정합성이 필수적인 '상품 가격' 데이터만 원본 테이블과 최소한으로 조인
            * Admin 수정 시점에 Read Model을 동기적으로 업데이트하는 방식을 채택하여 별도의 메시징 인프라 없이도 데이터 운영 단순성을 동시에 확보
         * <mark>[캐시 전략 미적용 판단 근거]</mark> 전문관 특성상 새로고침 시마다 서로 다른 콘텐츠 조합을 노출하는 랜덤 피드 전략 채택
    result: |
        
    

-   title: AI 이미지 라벨링 파이프라인
    index: 2
    period: 2026.02 ~ 2026.03
    info : |
        * Google Cloud Vision AI
        * Spring Boot
        * Spring
        * Kafka
    person: |
        기획 1, 개발 1
#    incharge: |
#        * 이미지 라벨링 개발
#        * Back Office 개발
#        * API 연동
    title2: 대용량 비정형 데이터 분석을 위한 비동기 파이프라인 구축 및 상태 제어 (2026.03 Phase 1 런칭 예정)
    problem: |
        * 방대한 리뷰 이미지 중 '고품질 이미지'를 선별하기 위해 수기 큐레이션에 전적으로 의존하는 한계 도달
        * 비정형 데이터인 이미지는 검색 및 카테고리화가 불가하여, 베스트 리뷰나 Lime, 신상품 등 다양한 서비스에서 재활용하기 어려움
        * <strong>처리 지연 리스크</strong>: 이미지 분석은 리소스 소모가 크고 처리 속도가 일정하지 않아, 실시간 처리 시 시스템 병목 및 타임아웃 우려
    solution: |
        * <mark>[최적의 AI 기술 스택 선정 (Trade-off)]</mark> Amazon Rekognition과 Google Cloud Vision AI를 비교 분석 단가는 높지만 커머스 도메인에 필수적인 '음식/사물' 객체 인식 및 Web Detection에 압도적으로 유리한 Google 솔루션을 채택하여 분석 정확도 확보
        * <mark>[고도화된 이미지 품질 평가 로직 설계]</mark> 단순 객체 인식을 이미지 라벨링을 넘어서, 이미지의 무게중심, 구도, 주요 색감, 유해성 판단 데이터를 정형화된 메타데이터로 추출하는 핵심 파이프라인 설계
        * <mark>[플랫폼 자산화 및 단계별 확장 전략]</mark> 특정 화면(Lime)만을 위한 단발성 개발이 아닌, 전사 공통 자산화를 목표로 설계 3월 Phase 1(Lime 핀터레스트형 피드 전시) 런칭을 시작으로, 향후 Phase 2, 3를 통해 '베스트 리뷰 자동 선정', '신상 발견 페이지' 등으로 활용처를 무한히 확장할 수 있는 유연한 데이터 뼈대 구축
        * <mark>[비동기 파이프라인 설계 (Kafka 기반 상태 전이)]</mark> 리뷰 이미지 분석 요청을 즉시 동기 처리하지 않고 별도 분석 대상 테이블에 적재 후 상태 기반 비동기 처리 구조 설계
            * <strong>상태 전이 모델 정의</strong> : READY → SEND → SUCCESS / FAILED
            * Kafka를 통해 분석 요청을 비동기 전달하고 분석 완료 결과에 따라 상태를 갱신하도록 설계하여 처리 흐름을 명확히 추적 가능하도록 구현

-   title: Crema API 신규 연동 및 레거시 최적화
    index: 3
    period: 2023.10 ~ 2024.9
    info : |
        * Spring batch
    person: |
        기획 1, 개발 1
#    incharge: |
#        * Back-End 개발
#        * Back Office 개발
#        * H Fashion몰, EQL몰 인터페이스, 배치 개발
    description: |
        * 상품, 주문, 주문상세&클레임, 리뷰, 카테고리 API 개발 및 연동 _(`23.10 - `24.02)_
        * 각 API 단 건 전송을 <mark>List로 변경하여 전송하는 v2 개발</mark> _(`24.03 - `24.08)_
        * 인터페이스 내역 감소로 인한 장애 사전 대응 작업
            * 주문 36만건 → 1만건, 결과: 누적 데이터 <mark>97%감소</mark>
            * 주문 상세&클레임 67만건 → 8천건, 결과: 누적 데이터 <mark>98%감소</mark>
            * 상품 3만건 → 2천건, 결과: 누적 데이터 <mark>94%감소</mark>
        * FitProduct API 개발을 위해 상품 상세 사이즈 정보 전체 파싱 개발
        * Crema API인 주문, 주문상세, 클레임 쿼리 <mark>속도개선</mark>을 위해 전체 수정 작업 진행
            * 주문 <mark>3.19sec → 0.02sec</mark>
            * 주문상세 <mark>3.73sec → 0.47sec</mark>
            * 클레임 <mark>2.96sec → 0.13sec</mark>
        * H패션몰 H.Plus 포인트 적립에서 한섬 마일리지로 적립 전환을 위한 마일리지 API 개발
    title2: H패션몰 Crema 리뷰 신규 도입 및 전사 연동 파이프라인 98% 최적화
    problem: |
        * <strong>[잠재된 레거시 리스크 (2021~)]</strong> 과거 도입된 Crema API가 리뷰와 무관한 '개인정보 삭제 배치'가 돌 때마다 월 1,000만 건 이상의 무의미한 전체 갱신 트래픽을 발생시키고 있었음
        * <strong>[장애 트리거 위기 (2024)]</strong> H패션몰에 Crema를 신규 도입해야 하는 상황에서, 기존 레거시 구조를 그대로 차용할 경우 데이터 누적이 2배 이상된다면 인프라 장애로 이어질 수 있는 치명적인 리스크 직면
    solution: |
        * <mark>[도메인 강결합 제거 및 쿼리 최적화]</mark> 리뷰 연동 API가 타 도메인의 배치 작업에 사이드 이펙트를 받지 않도록, 클레임 & 주문 파트 담당자들과 도메인 목적에 맞게 쿼리를 전면 분리 및 재설계
            * 쿼리 속도를 최대 150배 이상 개선 (주문: 3.19s ➔ 0.02s 등)
        * <mark>[네트워크 I/O 최적화 (단건 ➔ 배치)]</mark> Crema 측과 협의하여, 기존 1건씩 처리되던 비효율적인 전송 방식을 개당 20~50건의 List(Chunk) 형태로 묶어 전송하도록 파이프라인 개편
        * <mark>[98% 데이터 절감 및 안정적 신규 연동]</mark> H패션몰 신규 도입 성공
            * 기존 EQL의 불필요한 연동 트래픽까지 평균 98% (월 1,000만 건 ➔ 20만 건 수준) 감소시켜 인프라 레벨의 잠재 장애 요소를 차단


-   title: AI Agent를 통한 QA 협업 프로세스 혁신
    index: 4
    period: 2025.11 ~ 2025.01
    info : |
        * n8n
        * chatGpt
        * AI Agent
    person: |
        개발 1, QA 1
#    incharge: |
#        * n8n 업무 자동화 개발
    title2: 자발적 도구 개발을 통한 부서 간 협업 병목 현상 해결 및 QA 리드타임 33% 단축
    problem: |
        * <strong>커뮤니케이션 오버헤드</strong>: Jira 이슈의 상태 변경, 댓글 멘션 등을 수동으로 확인해야 하는 구조로 즉각적인 대응이 어려움
        * <strong>QA 병목 현상</strong>: 전체 개발 프로세스의 마지막 단계인 QA 리드타임이 길어지는 문제 직면
        * 2개의 프로젝트(LIME, 장바구니)를 진행하면서 QA 대응 과정의 효율을 개선할 필요성을 느낌
    solution: |
        * <mark>[이슈 트래킹 자동화]</mark> n8n 기반 워크플로우를 설계하여 Slack으로 실시간 전송하는 파이프라인 설계
            * Jira Webhook → n8n → chat Gpt → Slack
        * <mark>[AI Agent (LLM) 기반 맥락 분석]</mark> ChatGPT AI를 연동하여, '코멘트의 맥락을 AI가 분석하여 다음 행동의 필요성을 판단'하고 담당자에게 멘션하도록 고도화
        * <mark>[정량적 성과 달성]</mark> 개발팀과 프리랜서 QA팀 양측의 커뮤니케이션 리소스를 획기적으로 절감하여 QA 리드타임 단축
            * QA팀 인터뷰 기준 <strong>업무 처리 속도 약 1.5배 개선</strong>
            * 평균 반복 이벤트 테스트 기간 <strong>3일 → 2일 이내 단축 (33% 개선)</strong>


-   title: 장바구니 시스템 클라우드 전환 및 구매 전 추천 페이지 개선
    index: 5
    period: 2025.06 ~ 2025.09
    info : |
        * Spring Boot
        * Java
        * Rest API
        * JPA
        * Vue.js
    person: |
        개발 3, 기획 1
#    incharge: |
#        * 백엔드 구조 개편
#        * 클라우드 전환 대응
    description: |
        * 기존 장바구니 시스템의 <mark>클라우드 전환을 위한 구조 개편</mark>
        * Spring Boot 기반으로 점진적 전환하며 Java 8 → <mark>Java 21 업그레이드</mark> 및 레거시 코드 정리
        * <mark>헥사고날 아키텍처(Ports & Adapters)</mark>를 적용해 장바구니 핵심 도메인과 외부 연계/정책 영역 분리
        * 외부 서비스 및 혜택/정책 연계에 대응할 수 있도록 도메인 분리 및 API 구조 개선
        * 장바구니/주문서 사이에 위치한 <mark>구매 전 추천 페이지 OpenSearch를 활용한 재구축 및 추천 상품 구조 개편</mark>
    title2: 레거시 장바구니 클라우드 전환 및 구매 전 추천 퍼널 개선
    problem: |
         * 기존 Java/JSP 기반의 장바구니는 화면과 비즈니스 로직이 강결합되어 유지보수가 어려움
         * 장바구니 내 추천 상품 조회가 메인 DB를 거치고 있어, 트래픽 증가 시 장바구니 DB에 부하를 줄 우려가 존재함
         * 클라우드 전환 및 서비스 확장을 고려했을 때, 확장 대비가 어려운 기술 스택(JDK 1.8, JSP)
    solution: | 
         * <mark>[모던 스택 전환 및 API 분리]</mark> JDK 21 / Spring Boot로 환경을 업그레이드하고, Vuejs 도입에 맞추어 프론트엔드와 백엔드 API를 분리해 결합도를 최소화함
         * <mark>[조회 계층 분리(OpenSearch 활용)]</mark> 추천 상품 조회를 기존 RDB 기반 조회에서 OpenSearch 기반 조회 구조로 전환(기존 검색 인프라 활용)
         * <mark>[구매 전 퍼널(Funnel) 개선]</mark> 장바구니와 주문서 사이에 '구매 전 추천 페이지'를 재설계하여, 핵심 시스템의 안정성을 해치지 않으면서도 유저의 추가 탐색을 유도하는 기반 마련


