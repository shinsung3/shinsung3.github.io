-   title: Health & Wellness 전문관 Lime 플랫폼 신규 구축
    index: 1
    period: 2025.9 ~ 2025.12, phase2 진행중
    info : |
        * Spring Boot, Spring, Java, REST API
        * Vue.js, JSP
    person: |
        * 개발 2명, 기획 1명, 마케팅 2명, 운영 3명
    incharge: |
        * Back Office 개발
        * 백엔드 구조 설계
        * 전시/콘텐츠 도메인 설계
        * Front-End 연동 API 개발
    description: |
        * Health & Wellness 전문관 신규 런칭을 위한 전용 <mark>전시/콘텐츠 플랫폼 구축</mark>
        * 상품, 레시피, 리뷰, 매거진, 이렇게먹어보세요, 배너, 전체상품리스트 등 다양한 콘텐츠 타입을 하나의 전시 구조를 위한 테이블 설계 및 통합
        * 운영자가 설정만으로 콘텐츠 구성 및 노출 순서를 변경할 수 있도록 Back Office 중심 구조 설계
        * 신규 콘텐츠 타입 추가 시 API 및 테이블 확장만으로 대응 가능하도록 설계
    main: Health & Wellness 전문관 Lime 플랫폼 신규 구축
    title2: 이기종 도메인 통합을 위한 전시 구조 설계
    problem: |
        * 신규 전문관 특성상 상품, 리뷰, 커뮤니티 등 서로 다른 도메인(이기종) 데이터를 한 화면에 렌더링해야 함
         * 기존처럼 각 API를 병렬 호출하거나 다중 테이블을 조인할 경우, 도메인 간 강결합이 발생하고 트래픽 증가 시 성능 저하 우려
    solution: |
        * <mark>[Read Model 아키텍처 설계]</mark> 도메인 결합도를 낮추기 위해 변동성이 적은 메타데이터(이미지, 텍스트)를 전시 전용 단일 테이블(LIME_CONTENTS)로 통합 적재.
         * <mark>[성능과 정합성의 Trade-off 균형]</mark> 실시간 정합성이 필수적인 '상품 가격' 데이터만 원본 테이블과 최소한으로 조인하여, 데이터 신뢰성을 지키면서도 무거운 조인 부하를 제거.
         * <mark>[확장성 확보]</mark> 클라이언트가 단일 API만 호출하도록 단순화하여, 신규 콘텐츠 타입 추가 시 백엔드 스키마 변경 없이 즉시 대응 가능한 유연한 뼈대 구축.


-   title: 장바구니 시스템 클라우드 전환 및 구매 전 추천 페이지 개선
    index: 2
    period: 2025.06 ~ 2025.09
    info : |
        * Spring Boot, Java, Rest API
        * AWS, Redis
    person: |
        * 개발 3명, 기획 1명
    incharge: |
        * 장바구니 백엔드 구조 개편
        * 클라우드 전환 대응
        * 데이터 정합성 및 안정성 개선
    description: |
        * 기존 장바구니 시스템의 <mark>클라우드 전환을 위한 구조 개편</mark>
        * Spring Boot 기반으로 점진적 전환하며 Java 8 → <mark>Java 21 업그레이드</mark> 및 레거시 코드 정리
        * <mark>헥사고날 아키텍처(Ports & Adapters)</mark>를 적용해 장바구니 핵심 도메인과 외부 연계/정책 영역 분리
        * 외부 서비스 및 혜택/정책 연계에 대응할 수 있도록 도메인 분리 및 API 구조 개선
        * 장바구니/주문서 사이에 위치한 <mark>구매 전 추천 페이지 OpenSearch를 활용한 재구축 및 추천 상품 구조 개편</mark>
    title2: 레거시 장바구니 클라우드 전환 및 구매 전 추천 퍼널 개선
    problem: |
         * 기존 Java/JSP 기반의 장바구니는 화면과 비즈니스 로직이 강결합되어 유지보수가 어려움
         * 장바구니 내 추천 상품 조회가 메인 DB를 거치고 있어, 트래픽 증가 시 장바구니 핵심 트랜잭션 DB에 부하를 줄 우려가 존재함.
         * 클라우드 전환 및 서비스 확장을 고려했을 때, 확장 대비가 어려운 기술 스택(JDK 1.8, JSP)
    solution: | 
         * <mark>[모던 스택 전환 및 API 분리]</mark> JDK 21 / Spring Boot로 환경을 업그레이드하고, Vue.js 도입에 맞추어 프론트엔드와 백엔드 API를 분리해 결합도를 최소화함
         * <mark>[조회 성능 극대화 (OpenSearch)]</mark> DA팀의 추천 상품 데이터를 RDB에서 조회하던 방식을 OpenSearch 기반으로 이관. 상품 번호 기반 즉시 조회 환경을 구축하여 메인 DB의 부하를 원천 차단하고 응답 속도를 개선함.
         * <mark>[구매 전 퍼널(Funnel) 개선]</mark> 장바구니와 주문서 사이에 '구매 전 추천 페이지'를 성공적으로 재설계하여, 핵심 시스템의 안정성을 해치지 않으면서도 유저의 추가 탐색(Cross-selling)을 유도하는 기반 마련

-   title: AI Agent를 통한 QA 이슈 대응 체계 개선
    index: 3
    period: 2025.11 ~ 2025.01
    info : |
        * n8n, chatGpt
    person: |
        * 개발 1명, QA담당자 1명
    incharge: |
        * n8n 업무 자동화 개발
    description: |
        * 기존 장바구니 시스템의 <mark>클라우드 전환을 위한 구조 개편</mark>
        * Spring Boot 기반으로 점진적 전환하며 Java 8 → <mark>Java 21 업그레이드</mark> 및 레거시 코드 정리
        * <mark>헥사고날 아키텍처(Ports & Adapters)</mark>를 적용해 장바구니 핵심 도메인과 외부 연계/정책 영역 분리
        * 외부 서비스 및 혜택/정책 연계에 대응할 수 있도록 도메인 분리 및 API 구조 개선
        * 장바구니/주문서 사이에 위치한 <mark>구매 전 추천 페이지 OpenSearch를 활용한 재구축 및 추천 상품 구조 개편</mark>
    title2: n8n 기반 AI Agent를 활용한 QA 이슈 알림봇 구축
    problem: |
        * QA 과정에서 Jira 이슈 생성, 상태 변경, 댓글 멘션 등이 각 담당자가 직접하지 않으면 알 수 있는 방법 없음
        * 각 담당자가 수동으로 변경 사항을 트래킹해야 하여 업무 생산성 저하.
        * 2개의 프로젝트를 진행하면서 QA 대응 과정의 효율을 개선할 필요성을 느낌
    solution: |
        * <mark>[이슈 트래킹 자동화]</mark> n8n 플랫폼을 활용하여, Jira Webhook으로 발생하는 이슈 이벤트를 수집하고 필요한 정보만 추출해 Slack으로 실시간 전송하는 파이프라인 설계
        * <mark>[AI Agent (LLM) 기반 맥락 분석]</mark> ChatGPT AI를 연동하여, 단순히 알림만 주는 것을 넘어 '코멘트의 맥락을 AI가 분석하여 다음 행동(Next Action)의 필요성을 판단'하고 담당자에게 멘션하도록 고도화
        * <mark>[생산성 혁신]</mark> 개발팀과 프리랜서 QA팀 양측의 불필요한 수동 트래킹 및 커뮤니케이션 리소스를 획기적으로 절감하여 QA 리드타임 단축

-   title: AI 이미지 라벨링 파이프라인
    index: 4
    period: 2023.10 ~ 2024.9
    info : |
        * Google Cloud Vision AI
        * Spring Boot/Spring
        * Kafka
    person: |
        * 기획 1명, 개발 1명
    incharge: |
        * 이미지 라벨링 개발
        * Back Office 개발
        * API 연동
    description: |
        * 상품, 주문, 주문상세&클레임, 리뷰, 카테고리 API 개발 및 연동 _(`23.10 - `24.02)_
        * 각 API 단 건 전송을 <mark>List로 변경하여 전송하는 v2 개발</mark> _(`24.03 - `24.08)_
        * 인터페이스 내역 감소로 인한 장애 사전 대응 작업
            * 주문 36만건 → 1만건, 결과: 누적 데이터 <mark>97%감소</mark>
            * 주문 상세&클레임 67만건 → 8천건, 결과: 누적 데이터 <mark>98%감소</mark>
            * 상품 3만건 → 2천건, 결과: 누적 데이터 <mark>94%감소</mark>
        * FitProduct API 개발을 위해 상품 상세 사이즈 정보 전체 파싱 개발
        * Crema API인 주문, 주문상세, 클레임 쿼리 <mark>속도개선</mark>을 위해 전체 수정 작업 진행
            * 주문 <mark>3.19sec → 0.02sec</mark>
            * 주문상세 <mark>3.73sec → 0.47sec</mark>
            * 클레임 <mark>2.96sec → 0.13sec</mark>
        * H패션몰 H.Plus 포인트 적립에서 한섬 마일리지로 적립 전환을 위한 마일리지 API 개발
    title2: 확장을 고려한 AI 기반 리뷰 이미지 분석/라벨링 파이프라인 구축 (2026.03 Phase 1 런칭 예정)
    problem: |
        * 방대한 리뷰 이미지 중 '고품질 이미지'를 선별하기 위해 비즈니스 조직의 수기 큐레이션에 전적으로 의존하는 한계 도달.
        * 비정형 데이터인 이미지는 검색 및 카테고리화가 불가하여, 베스트 리뷰나 신상품 기획전 등 다양한 서비스에서 자산으로 재활용하기 어려운 구조적 문제 존재.
    solution: |
        * <mark>[최적의 AI 기술 스택 선정 (Trade-off)]</mark> Amazon Rekognition과 Google Cloud Vision AI를 비교 분석. 단가는 높지만 커머스 도메인에 필수적인 '음식/사물' 객체 인식 및 Web Detection에 압도적으로 유리한 Google 솔루션을 채택하여 분석 정확도를 최우선으로 확보
        * <mark>[고도화된 이미지 품질 평가 로직 설계]</mark> 단순 객체 인식을 이미지 라벨링을 넘어서, 이미지의 무게중심, 구도, 주요 색감, 유해성 판단 데이터를 정형화된 메타데이터로 추출하는 핵심 파이프라인 설계
        * <mark>[플랫폼 자산화 및 단계별 확장 전략]</mark> 특정 화면(Lime)만을 위한 단발성 개발이 아닌, 전사 공통 자산화를 목표로 설계. 3월 Phase 1(Lime 핀터레스트형 피드 전시) 런칭을 시작으로, 향후 Phase 2, 3를 통해 '베스트 리뷰 자동 선정', '신상 발견 페이지' 등으로 활용처를 무한히 확장할 수 있는 유연한 데이터 뼈대 구축


-   title: Crema API 신규 연동 및 레거시 최적화
    index: 5
    period: 2023.10 ~ 2024.9
    info : |
        * Spring batch
        * Java
        * Spring
    person: |
        * 기획 1명, 백엔드 1명
    incharge: |
        * Back-End 개발
        * Back Office 개발
        * H Fashion몰, EQL몰 인터페이스, 배치 개발
    description: |
        * 상품, 주문, 주문상세&클레임, 리뷰, 카테고리 API 개발 및 연동 _(`23.10 - `24.02)_
        * 각 API 단 건 전송을 <mark>List로 변경하여 전송하는 v2 개발</mark> _(`24.03 - `24.08)_
        * 인터페이스 내역 감소로 인한 장애 사전 대응 작업
            * 주문 36만건 → 1만건, 결과: 누적 데이터 <mark>97%감소</mark>
            * 주문 상세&클레임 67만건 → 8천건, 결과: 누적 데이터 <mark>98%감소</mark>
            * 상품 3만건 → 2천건, 결과: 누적 데이터 <mark>94%감소</mark>
        * FitProduct API 개발을 위해 상품 상세 사이즈 정보 전체 파싱 개발
        * Crema API인 주문, 주문상세, 클레임 쿼리 <mark>속도개선</mark>을 위해 전체 수정 작업 진행
            * 주문 <mark>3.19sec → 0.02sec</mark>
            * 주문상세 <mark>3.73sec → 0.47sec</mark>
            * 클레임 <mark>2.96sec → 0.13sec</mark>
        * H패션몰 H.Plus 포인트 적립에서 한섬 마일리지로 적립 전환을 위한 마일리지 API 개발
    title2: H패션몰 Crema 리뷰 신규 도입 및 전사 연동 파이프라인 98% 최적화
    problem: |
        * <strong>[잠재된 레거시 리스크 (2021~)]</strong> 과거 EQL 몰에 도입된 Crema 리뷰 연동 API가 타 도메인(클레임/주문)과 강결합되어, 리뷰와 무관한 '개인정보 삭제 배치'가 돌 때마다 월 1,000만 건 이상의 무의미한 전체 갱신(Full-refresh) 트래픽을 발생시키고 있었음.
        * <strong>[장애 트리거 위기 (2024)]</strong> 담당 중인 H패션몰에 Crema를 신규 도입해야 하는 상황에서, 기존 레거시 구조를 그대로 차용할 경우 데이터 누적이 2배 이상 폭증하여 인프라(테이블 스페이스 고갈 등) 실장애로 이어질 수 있는 치명적인 리스크 직면
    solution: |
        * <mark>[도메인 강결합 제거 및 쿼리 최적화]</mark> 리뷰 연동 API가 타 도메인의 배치 작업에 사이드 이펙트를 받지 않도록, 클레임 & 주문 파트 담당자들과 협업하여 갱신 트리거 조건과 쿼리를 도메인 목적에 맞게 전면 분리 및 재설계
        * <mark>[네트워크 I/O 최적화 (단건 ➔ 배치)]</mark> Crema 측과 직접 협의하여, 기존 1건씩 처리되던 비효율적인 전송 방식을 개당 20~50건의 List(Chunk) 형태로 묶어 전송하도록 파이프라인 전면 개편
        * <mark>[98% 데이터 절감 및 안정적 신규 연동]</mark> H패션몰 신규 도입을 안정적으로 완수함과 동시에, 기존 EQL 몰의 불필요한 연동 트래픽까지 평균 98% (월 1,000만 건 ➔ 20만 건 수준) 획기적으로 감소시켜 인프라 레벨의 잠재 장애 요소를 원천 차단함

